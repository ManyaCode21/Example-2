<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Choose Your Country:</label>
    <input type="text" list="xyz">


    <datalist id="xyz" >
        <option value="India">
        <option value="Russia">
        <option value="Germany">
        <option value="France">
        <option value="Kenya">
    </datalist>

    <label>Product</label>
    <input type="text" list="product">

    <datalist id="product">
        <option value="Pizza">
        <option value="Burger">
        <option value="Fries">
        <option value="Dessert">
        <option value="Drinks">
    </datalist>




</body>
</html>
