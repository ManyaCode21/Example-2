<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and Video</title>
</head>
<body>

    <audio controls autoplay loop>
        <source src="clickaudio.mp3" type="audio/mpeg">
    </audio>

    <br><br>

    <video controls autoplay loop muted width="600" height="400">
        <source src="video.mp4" type="video/mp4">
    </video>

</body>
</html>
