<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chocolate Products</title>

    <style>

        .parent{
            display: flex;
        }

        .card{
            background-color: beige;
            width: 250px;
            border: 1px solid black;
            border-radius: 10px;
            text-align: center;
            margin: 10px;
            padding: 10px;
            box-shadow: 0 4px 8px blueviolet;
        }

        .card:hover{
            background-color: lightpink;
        }

        img{
            width: 150px;
            height: 150px;
        }

    </style>
</head>
<body>

<div class="parent">

    <div class="card">
        <img src="https://elavegan.com/wp-content/uploads/2020/06/7-homemade-Ferrero-Rocher-truffles-on-a-small-plate-with-one-showing-the-inside.jpg">
        <h2>Ferrero Rocher</h2>
        <p>Premium chocolate with a crunchy hazelnut center.</p>
    </div>

    <div class="card">
        <img src="https://www.bigbasket.com/media/uploads/groot/images/1532022-12eeaf99-oreo.jpg">
        <h2>Dairy Milk</h2>
        <p>Rich and creamy milk chocolate loved by everyone.</p>
    </div>

    <div class="card">
        <img src="https://www.bigbasket.com/media/uploads/flatpages/mailer-images-aug/100532699_280426_1.jpg">
        <h2>KitKat</h2>
        <p>Crispy wafer layers covered in delicious chocolate.</p>
    </div>

</div>

</body>
</html>
