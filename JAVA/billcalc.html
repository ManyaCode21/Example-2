<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function example</title>
</head>
<body>
    <button onclick="billCalc()">Bill Calculator</button>

    <script>
        // Addition function
        function addition() {
            var a = 10;
            var b = 5;
            var result = a + b;

            console.log("Result is " , result);
        }

        addition();

        // Grocery Bill Calculator
        function billCalc() {
            var p1 = "Milk";
            var price1 = 50;

            var p2 = "Bread";
            var price2 = 30;

            var totalBill = price1 + price2;

            console.log("Total bill of " , p1 , " and " , p2 , " is " , totalBill);
        }
    </script>
</body>
</html>
