<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner HTML</title>
</head>
<body>
    <h1 id="myH">Hello</h1>

<button onclick="change()">Click Me</button>

<script>
function change()
{
    const abc = document.getElementById("myH");

    console.log(abc);

    abc.innerHTML = "Welcome Manya!";
}
</script>

</body>
</html>
