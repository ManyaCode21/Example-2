<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array and object example</title>
</head>
<body>
    <script>
    // Array
    var students = ["A", "B", "C", "D", "E"];
    console.log(students);

    console.log(students[0]); // A
    console.log(students[2]); // C

    // Object
    var product1 = {
        name: "Laptop",
        price: 50000,
        review: 4.5,
        available: true
    };

    console.log(product1);

    // Access object properties
    console.log(product1.name);
    console.log(product1.price);
</script>
</body>
</html>
