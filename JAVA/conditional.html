<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if else</title>
</head>
<body>
    <script>
    // Simple if statement
    let age1 = 12;

    if (age1 >= 18) {
        console.log("You can vote");
    }

    // if-else statement
    let age2 = 12;

    if (age2 >= 18) {
        console.log("You can vote");
    } else {
        console.log("Grow up, kiddo");
    }

    // if-else if-else statement
    let amount = 150;

    if (amount > 500) {
        console.log("Free Delivery");
    } else if (amount > 400) {
        console.log("Delivery charges Rs.20");
    } else if (amount > 300) {
        console.log("Delivery charges Rs.30");
    } else {
        console.log("Can't place order. Minimum order is Rs.300");
    }
</script>
</body>
</html>
